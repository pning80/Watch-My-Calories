# Production AdMob unit IDs for the Android app (com.pning80.watchmycalories).
# Mirror of `Ads/AdMob-iOS.xcconfig`; read by `WatchMyCaloriesAndroid/app/build.gradle.kts`
# and surfaced as BuildConfig fields + manifest placeholder at build time.
#
# Per Google's AdMob model each platform has its own app registration; these
# Android-specific unit IDs come from a separate AdMob app entry from the iOS
# IDs (publisher account `4373517820912322` is shared; app IDs differ).
#
# Dev override path: any value defined in WatchMyCaloriesAndroid/local.properties
# takes precedence over the values here. Absent both, build.gradle.kts falls
# back to Google's published test unit IDs.
#
# Unit-ID provenance (from AdMob console):
#   Android_Banner                  -> ADMOB_BANNER_ID
#   Android_food_analysis_native    -> ADMOB_NATIVE_ID
#
# Interstitial is intentionally absent — no Android prod interstitial unit has
# been created. `BannerAdView.kt` / `AdManager.isTestUnit` both detect the
# Google-test prefix and suppress rendering at runtime, so a release build
# falling back to the test interstitial ID never shows test creative. If/when
# an Android_Interstitial unit lands in AdMob, add `ADMOB_INTERSTITIAL_ID` below.

ADMOB_APP_ID=ca-app-pub-4373517820912322~1689672569
ADMOB_BANNER_ID=ca-app-pub-4373517820912322/5302448664
ADMOB_NATIVE_ID=ca-app-pub-4373517820912322/9130013032
