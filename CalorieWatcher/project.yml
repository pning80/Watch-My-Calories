name: CalorieWatcher
options:
  bundleIdPrefix: com.pning80
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: G63KVDL36L
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  CalorieWatcher:
    type: application
    platform: iOS
    sources:
      - CalorieWatcher
      - path: ImageStorage.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pning80.CalorieWatcher
        CODE_SIGN_ENTITLEMENTS: CalorieWatcher/CalorieWatcher.entitlements
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSCameraUsageDescription: "We need access to the camera to scan your meals."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "We need access to your active energy data to adjust your daily calorie goals."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "We use this data to track your burned calories."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: CalorieWatcher/CalorieWatcher.entitlements

  CalorieWatcherUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CalorieWatcherUITests
    dependencies:
      - target: CalorieWatcher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pning80.CalorieWatcher.UITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CalorieWatcher

schemes:
  CalorieWatcher:
    build:
      targets:
        CalorieWatcher: all
        CalorieWatcherUITests: [test]
    test:
      targets:
        - CalorieWatcherUITests
