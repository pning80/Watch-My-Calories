name: WatchMyCalories
options:
  bundleIdPrefix: com.pning80
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: G63KVDL36L
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: 4

targets:
  WatchMyCalories:
    type: application
    platform: iOS
    sources:
      - WatchMyCalories
      - path: ImageStorage.swift
        type: file
    dependencies:
      - package: GoogleMobileAds
    configFiles:
      Debug: ../Ads/AdMob-iOS.xcconfig
      Release: ../Ads/AdMob-iOS.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pning80.WatchMyCalories
        CODE_SIGN_ENTITLEMENTS: WatchMyCalories/WatchMyCalories.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSCameraUsageDescription: "We need access to the camera to scan your meals."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "We need access to your active energy data to adjust your daily calorie goals."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "This app does not write data to Apple Health."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: WatchMyCalories/WatchMyCalories.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  WatchMyCaloriesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WatchMyCaloriesTests
    dependencies:
      - target: WatchMyCalories
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pning80.WatchMyCalories.Tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WatchMyCalories

  WatchMyCaloriesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WatchMyCaloriesUITests
    dependencies:
      - target: WatchMyCalories
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pning80.WatchMyCalories.UITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: WatchMyCalories

schemes:
  WatchMyCalories:
    build:
      targets:
        WatchMyCalories: all
        WatchMyCaloriesTests: [test]
        WatchMyCaloriesUITests: [test]
    test:
      targets:
        - WatchMyCaloriesTests
        - WatchMyCaloriesUITests
