name: Porting Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Schema, accessibility, and SDK-removal gates — Bash-only, fast.
  static-gates:
    name: Schema / Accessibility / Android-SDK gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: T1.2 — iOS↔Android schema diff
        run: bash scripts/schema-diff.sh

      - name: T2.4 — Android accessibility superset of iOS
        run: bash scripts/accessibility-diff.sh

      - name: T1.5 — Android has no Gemini SDK / hardcoded API keys
        run: bash scripts/check-android-no-gemini-sdk.sh

  # Backend unit tests — self-contained, no network/env vars needed.
  backend-tests:
    name: Backend tests (npm test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci
      - run: npm test

  # Android unit tests — runs the Robolectric + JVM suite including the
  # shared-fixture-driven CalorieCalculator + MealType cases.
  android-tests:
    name: Android unit tests (./gradlew testDebugUnitTest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WatchMyCaloriesAndroid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :app:testDebugUnitTest
